name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      # OIDC "trusted publishing" needs npm >= 9.5.0. Node 22 ships npm 10.x
      # which is sufficient. The explicit version check ensures visibility.
      - name: Ensure npm supports OIDC trusted publishing
        run: |
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fail if any .failed.res files exist
        run: |
          if ls src/*.failed.res 1> /dev/null 2>&1; then
            echo "Refusing to publish — .failed.res files present"
            ls src/*.failed.res
            exit 1
          fi

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Check if version already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      # Determine the npm dist-tag based on version (prerelease vs stable)
      # Prereleases (e.g., 0.0.37-beta.2) are tagged with their prerelease identifier
      # Stable releases are tagged as 'latest'
      - name: Determine publish tag
        id: dist_tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            TAG="${BASH_REMATCH[1]}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Publishing prerelease version $VERSION with tag '$TAG'"
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "Publishing stable version $VERSION with tag 'latest'"
          fi

      # Uses OIDC trusted publishing — no long-lived NPM_TOKEN required.
      # Prereq: the `@juspay/rescript-blend` package must have a trusted
      # publisher configured on npmjs.com pointing at this repo + workflow +
      # environment (`juspay/blend-rescript` / `publish-npm.yml` / `npm`).
      # The `id-token: write` permission on this job supplies the OIDC token
      # that the npm CLI picks up automatically.
      - name: Publish with OIDC
        id: publish_oidc
        if: steps.check.outputs.already_published == 'false' && inputs.dry_run != 'true'
        continue-on-error: true
        run: npm publish --access public --provenance --tag ${{ steps.dist_tag.outputs.tag }}

      # Fallback: Use NPM_TOKEN if OIDC fails (e.g., trusted publisher not configured)
      - name: Publish with NPM_TOKEN
        if: steps.check.outputs.already_published == 'false' && inputs.dry_run != 'true' && steps.publish_oidc.outcome == 'failure'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag ${{ steps.dist_tag.outputs.tag }}

      - name: Dry run summary
        if: inputs.dry_run == 'true'
        run: |
          echo "Dry run — skipping actual publish"
          echo "Would publish with tag: ${{ steps.dist_tag.outputs.tag }}"
          npm publish --dry-run --access public --tag ${{ steps.dist_tag.outputs.tag }}
