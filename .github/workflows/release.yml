name: Release and Publish

# 1:1 versioning: @juspay/rescript-blend@X ships bindings for @juspay/blend-design-system@X.
# The version lives in package.json (set by the sync PR). On push to main we publish
# that version — but only if it isn't already on npm, so docs/chore commits don't
# trigger a duplicate-publish failure. (Replaces semantic-release.)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Check formatting
        run: npm run format:check

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      # 1:1 version comes from package.json. Skip publishing if this exact version
      # is already on npm (e.g. a non-version-bumping commit landed on main).
      - name: Decide whether to publish
        id: gate
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published — skipping."
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "Will publish $NAME@$VERSION."
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag
        if: steps.gate.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.gate.outputs.version }}"
          git push origin "v${{ steps.gate.outputs.version }}"

      - name: Publish to npm with OIDC provenance
        if: steps.gate.outputs.publish == 'true'
        run: |
          echo "Publishing ${{ steps.gate.outputs.version }} to npm with OIDC provenance..."
          npm publish --provenance --access public
          echo "Published to npm successfully!"

      - name: Setup Node for GitHub Packages
        if: steps.gate.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@juspay"

      - name: Publish to GitHub Packages
        if: steps.gate.outputs.publish == 'true'
        run: |
          echo "Publishing to GitHub Packages..."
          npm publish --access public --no-git-checks --registry https://npm.pkg.github.com
          echo "Published to GitHub Packages successfully!"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
