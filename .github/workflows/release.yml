name: Release and Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Check formatting
        run: npm run format:check

      - name: Fail if any .failed.res files exist
        run: |
          if ls src/*.failed.res 1> /dev/null 2>&1; then
            echo "Build left .failed.res files — cannot release"
            ls src/*.failed.res
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Fail if any .failed.res files exist
        run: |
          if ls src/*.failed.res 1> /dev/null 2>&1; then
            echo "Refusing to publish — .failed.res files present"
            ls src/*.failed.res
            exit 1
          fi

      - name: Release with semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: "0"

      - name: Publish to npm with OIDC provenance
        run: |
          echo "Publishing to npm with OIDC provenance..."
          npm publish --provenance --access public
          echo "Published to npm successfully!"

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@juspay"

      - name: Publish to GitHub Packages
        run: |
          if [ -f "package.json" ]; then
            echo "Publishing to GitHub Packages..."
            npm publish --access public --no-git-checks --registry https://npm.pkg.github.com
            echo "Published to GitHub Packages successfully!"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}