changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
      - github-actions
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 💥 Breaking Changes
      labels:
        - breaking
        - breaking-change
    - title: 📚 Documentation
      labels:
        - docs
        - documentation
    - title: 🔧 Maintenance
      labels:
        - chore
        - refactor
    - title: Other Changes
      labels:
        - "*"